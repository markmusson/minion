version: '3.9'

services:
  openclaw-minion:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "18789:18789"
    environment:
      - OPENCLAW_GATEWAY_PORT=18789
      - NODE_ENV=production
      - VERCEL_AI_GATEWAY_ENABLED=true
      - VERCEL_AI_GATEWAY_MODELS=gpt-4o,gpt-4o-mini,claude-opus-4-5,claude-sonnet-4-5
    volumes:
      - ./openclaw.json:/app/openclaw.json
      - ./.openclaw:/root/.openclaw
    command: |
      sh -c "
      npm install -g openclaw@2026.3.2-beta.1 &&
      openclaw gateway start
      "
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
